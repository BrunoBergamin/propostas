<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Bruno Bergamin · Desenvolvimento de Sistemas</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230f4c81'/%3E%3Cstop offset='1' stop-color='%231878c8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='45' font-family='Segoe UI,Arial,sans-serif' font-size='36' font-weight='800' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a2c4e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #mx { position: fixed; inset: 0; z-index: 0; }
  .card { position: relative; z-index: 1; background: #fff; border-radius: 18px; padding: 40px 46px; text-align: center; box-shadow: 0 24px 70px rgba(3,18,36,.55); max-width: 420px; }
  .logo { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, #0f4c81, #1878c8); color: #fff; font-size: 34px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  h1 { font-size: 24px; color: #0f4c81; }
  h1 span { color: #1a2332; }
  .sub { color: #6b7684; font-size: 14px; margin: 4px 0 20px; }
  .contact { font-size: 13px; color: #47525f; line-height: 1.8; }
  .contact a { color: #1878c8; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<canvas id="mx"></canvas>
<div class="card">
  <div class="logo">B</div>
  <h1>Bruno <span>Bergamin</span></h1>
  <div class="sub">Desenvolvimento de sistemas · Boituva/SP</div>
  <div class="contact">
    (15) 99694-9451<br>
    brunoalvesbergamin@gmail.com<br>
    <a href="https://www.linkedin.com/in/bruno-alves-bergamin-6b711a347">LinkedIn</a>
  </div>
</div>
<script>
const c = document.getElementById('mx'), x = c.getContext('2d');
const chars = ['{', '}', '<', '>', '</>', '/', '=', ';', '+', '*', '0', '1', '$', '#', '(', ')', '[', ']', '&&', '=>'];
let w, h, cx, cy, parts = [];
function spawn(init) {
  return {
    x: (Math.random() * 2 - 1) * 1100,
    y: (Math.random() * 2 - 1) * 1100,
    z: init ? 150 + Math.random() * 850 : 1000,
    ch: chars[Math.floor(Math.random() * chars.length)]
  };
}
function size() {
  w = c.width = innerWidth; h = c.height = innerHeight;
  cx = w / 2; cy = h / 2;
  parts = Array.from({ length: 240 }, () => spawn(true));
  draw();
}
function draw() {
  const g = x.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, '#082441');
  g.addColorStop(1, '#11497e');
  x.fillStyle = g; x.fillRect(0, 0, w, h);
  x.textAlign = 'center';
  for (const p of parts) {
    p.z -= 3;
    if (p.z <= 70) Object.assign(p, spawn(false));
    const f = 320 / p.z;
    const sx = cx + p.x * f, sy = cy + p.y * f;
    if (sx < -40 || sx > w + 40 || sy < -40 || sy > h + 40) { Object.assign(p, spawn(false)); continue; }
    const fs = Math.min(26, Math.max(6, 3400 / p.z));
    const a = Math.min(.9, (1050 - p.z) / 800);
    x.font = '600 ' + fs + 'px Consolas, monospace';
    x.fillStyle = p.z < 260 ? 'rgba(255,255,255,' + a + ')' : 'rgba(150,205,255,' + a + ')';
    x.fillText(p.ch, sx, sy);
  }
}
size(); addEventListener('resize', size);
setInterval(draw, 40);
</script>
</body>
</html>
